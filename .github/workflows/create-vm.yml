name: Create OCI VM

# Creates an Oracle Cloud "Always Free" ARM instance (VM.Standard.A1.Flex).
# Free ARM capacity is scarce, so a scheduled run retries every 10 minutes
# until capacity is available, then reports success to Slack. A guard skips
# creation when the instance already exists, so it is safe to run on a loop.
#
# Required GitHub repository secrets (values come from your .env / .env.example):
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_REGION, OCI_FINGERPRINT,
#   OCI_PRIVATE_KEY (full PEM text), OCI_SUBNET_OCID, OCI_IMAGE_OCID,
#   OCI_SSH_PUBLIC_KEY (full public key text), OCI_COMPARTMENT_OCID,
#   OCI_AD, OCI_SHAPE, SLACK_WEBHOOK_URL

on:
  workflow_dispatch:
    inputs:
      display_name:
        description: "Instance display name"
        required: false
        default: "gha-instance"
      ocpus:
        description: "OCPUs for A1.Flex (free tier max total: 4)"
        required: false
        default: "4"
      memory_in_gbs:
        description: "Memory in GBs for A1.Flex (free tier max total: 24)"
        required: false
        default: "24"
      boot_volume_size_gb:
        description: "Boot volume size in GB (min 50, free tier max 200)"
        required: false
        default: "200"
      max_attempts:
        description: "Retry attempts on capacity errors (manual runs)"
        required: false
        default: "30"
      retry_delay_seconds:
        description: "Seconds to wait between retries"
        required: false
        default: "60"
  schedule:
    # Every 10 minutes. Scheduled runs do a single attempt (the cron is the retry).
    - cron: "*/10 * * * *"

# Never let two runs launch at the same time (prevents creating duplicates).
concurrency:
  group: create-oci-vm
  cancel-in-progress: false

jobs:
  create-vm:
    runs-on: ubuntu-latest
    env:
      DISPLAY_NAME: ${{ github.event.inputs.display_name || 'gha-instance' }}
    steps:
      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          {
            echo "[DEFAULT]"
            echo "user=$OCI_USER_OCID"
            echo "fingerprint=$OCI_FINGERPRINT"
            echo "tenancy=$OCI_TENANCY_OCID"
            echo "region=$OCI_REGION"
            echo "key_file=/home/runner/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config
          oci setup repair-file-permissions --file ~/.oci/config || true

      - name: Check for existing instance
        id: check
        env:
          COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          set -uo pipefail
          if ! oci compute instance list --compartment-id "$COMPARTMENT_OCID" --all > /tmp/list.json 2>/tmp/list.err; then
            echo "Could not list instances; assuming none exist."
            cat /tmp/list.err || true
            echo '{"data":[]}' > /tmp/list.json
          fi
          COUNT=$(jq --arg n "$DISPLAY_NAME" '[ .data[]? | select(.["display-name"] == $n) | select(.["lifecycle-state"] == "RUNNING" or .["lifecycle-state"] == "PROVISIONING" or .["lifecycle-state"] == "STARTING") ] | length' /tmp/list.json)
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "An instance named [$DISPLAY_NAME] already exists; skipping launch."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No live instance named [$DISPLAY_NAME]; will attempt to launch."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Launch instance (retry on capacity errors)
        id: launch
        if: steps.check.outputs.exists != 'true'
        env:
          COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          AD: ${{ secrets.OCI_AD }}
          SHAPE: ${{ secrets.OCI_SHAPE }}
          SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
          SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCPUS: ${{ github.event.inputs.ocpus || '4' }}
          MEMORY: ${{ github.event.inputs.memory_in_gbs || '24' }}
          BOOT_VOL: ${{ github.event.inputs.boot_volume_size_gb || '200' }}
          # Scheduled runs do a single attempt; the cron is the retry loop.
          MAX_ATTEMPTS: ${{ github.event.inputs.max_attempts || '1' }}
          RETRY_DELAY: ${{ github.event.inputs.retry_delay_seconds || '60' }}
        run: |
          set -uo pipefail
          printf '%s\n' "$SSH_PUBLIC_KEY" > /tmp/ssh_authorized_keys.pub

          attempt=1
          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            echo "::group::Launch attempt $attempt / $MAX_ATTEMPTS"
            # The trailing "|| code=..." stops bash -e from aborting the step on
            # failure, so we can read the error and decide whether to retry.
            code=0
            oci compute instance launch \
              --compartment-id "$COMPARTMENT_OCID" \
              --availability-domain "$AD" \
              --shape "$SHAPE" \
              --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY}" \
              --subnet-id "$SUBNET_OCID" \
              --image-id "$IMAGE_OCID" \
              --display-name "$DISPLAY_NAME" \
              --assign-public-ip true \
              --boot-volume-size-in-gbs "$BOOT_VOL" \
              --ssh-authorized-keys-file /tmp/ssh_authorized_keys.pub \
              --wait-for-state RUNNING \
              > /tmp/launch.out 2> /tmp/launch.err || code=$?
            cat /tmp/launch.err || true
            echo "::endgroup::"

            if [ "$code" -eq 0 ]; then
              echo "Instance launched successfully."
              INSTANCE_ID=$(jq -r '.data.id' /tmp/launch.out)
              echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
              echo "status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if grep -qi "Out of host capacity\|LimitExceeded\|TooManyRequests\|429\|500\|InternalError" /tmp/launch.err; then
              echo "Capacity/throttling error on attempt $attempt."
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep "$RETRY_DELAY"
              fi
              attempt=$((attempt + 1))
              continue
            fi

            echo "Non-retryable error (see above)."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          done

          # Capacity still unavailable. Treat as a soft outcome (exit 0) so the
          # Actions history is not flooded with red failures every 10 minutes.
          echo "No capacity this run; will try again next schedule."
          echo "status=capacity_exhausted" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Get public IP
        id: ip
        if: steps.launch.outputs.status == 'success'
        run: |
          set -euo pipefail
          PUBLIC_IP=$(oci compute instance list-vnics --instance-id "${{ steps.launch.outputs.instance_id }}" --query 'data[0]."public-ip"' --raw-output)
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "Public IP: $PUBLIC_IP"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EXISTS: ${{ steps.check.outputs.exists }}
          EVENT: ${{ github.event_name }}
          LAUNCH_STATUS: ${{ steps.launch.outputs.status }}
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
          PUBLIC_IP: ${{ steps.ip.outputs.public_ip }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u

          # Stay silent on routine "nothing to do" outcomes so a 10-minute
          # schedule does not spam Slack.
          if [ "$EXISTS" = "true" ]; then
            echo "Instance already exists; no Slack notification."
            exit 0
          fi
          if [ "$LAUNCH_STATUS" = "capacity_exhausted" ] && [ "$EVENT" = "schedule" ]; then
            echo "No capacity on scheduled run; staying quiet."
            exit 0
          fi

          if [ "$LAUNCH_STATUS" = "success" ]; then
            text=":white_check_mark: *OCI VM created* [${DISPLAY_NAME}]\nInstance: ${INSTANCE_ID}\nPublic IP: ${PUBLIC_IP}\n<${RUN_URL}|View run>"
          elif [ "$LAUNCH_STATUS" = "capacity_exhausted" ]; then
            text=":hourglass_flowing_sand: *OCI VM not created* - out of host capacity after all retries.\n<${RUN_URL}|View run>"
          else
            text=":x: *OCI VM creation failed*\nStatus: ${LAUNCH_STATUS:-unknown}\n<${RUN_URL}|View run>"
          fi

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notification."
            exit 0
          fi
          payload=$(jq -n --arg t "$text" '{text: $t}')
          curl -fsS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
